<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام الكاشير المتكامل</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .section { margin-bottom: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9; }
        .fav-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .fav-btn { padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; width: 95%; margin-bottom: 5px; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 4px; background: #28a745; color: white; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        .qty-btn { padding: 5px 10px; cursor: pointer; font-weight: bold; border-radius: 4px; border: 1px solid #ccc; }
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
    </style>
</head>
<body>

<div class="container">
    <h2 class="no-print">نظام الكاشير المتكامل</h2>

    <div class="no-print section">
        <h3>المنتجات المفضلة</h3>
        <input type="text" id="favName" placeholder="اسم المنتج">
        <input type="number" id="favPrice" placeholder="السعر">
        <button style="background:#007bff" onclick="saveFav()">إضافة للمفضلة</button>
        <div class="fav-grid" id="favContainer"></div>
    </div>

    <div class="print-only" style="display:none; text-align:center;">
        <h2 id="printTime"></h2>
    </div>
    <table id="invoiceTable">
        <thead><tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>الإجمالي</th><th class="no-print">إجراء</th></tr></thead>
        <tbody id="invoiceBody"></tbody>
    </table>
    <h3>الإجمالي: <span id="grandTotal">0</span> د.ع</h3>
    <button class="no-print" onclick="printInvoice()" style="width:100%; font-size:1.2em;">طباعة الفاتورة</button>
</div>

<script>
    window.onload = () => { renderFavs(); renderInvoice(); };

    // --- المفضلة ---
    function saveFav() {
        const name = document.getElementById('favName').value;
        const price = parseFloat(document.getElementById('favPrice').value);
        if(!name || isNaN(price)) return alert("يرجى إدخال اسم المنتج والسعر بشكل صحيح");
        
        let favs = JSON.parse(localStorage.getItem('favs') || '[]');
        favs.push({name, price});
        localStorage.setItem('favs', JSON.stringify(favs));
        renderFavs();
        
        document.getElementById('favName').value = '';
        document.getElementById('favPrice').value = '';
    }

    function renderFavs() {
        const container = document.getElementById('favContainer');
        container.innerHTML = "";
        let favs = JSON.parse(localStorage.getItem('favs') || '[]');
        favs.forEach(f => {
            let btn = document.createElement('button');
            btn.className = 'fav-btn';
            // عرض الاسم والسعر في الزر
            btn.innerText = `${f.name} (${f.price} د.ع)`;
            btn.onclick = () => addItem(f.name, f.price);
            container.appendChild(btn);
        });
    }

    // --- الفاتورة ---
    function addItem(name, price) {
        let inv = JSON.parse(localStorage.getItem('inv') || '[]');
        let item = inv.find(i => i.name === name);
        if(item) item.qty++;
        else inv.push({name, price: parseFloat(price), qty: 1});
        localStorage.setItem('inv', JSON.stringify(inv));
        renderInvoice();
    }

    function decreaseItem(index) {
        let inv = JSON.parse(localStorage.getItem('inv') || '[]');
        if (inv[index].qty > 1) inv[index].qty--;
        else inv.splice(index, 1);
        localStorage.setItem('inv', JSON.stringify(inv));
        renderInvoice();
    }

    function renderInvoice() {
        const body = document.getElementById('invoiceBody');
        body.innerHTML = "";
        let inv = JSON.parse(localStorage.getItem('inv') || '[]');
        let total = 0;
        inv.forEach((item, i) => {
            let sum = item.price * item.qty;
            total += sum;
            // إضافة الكلاس no-print للأزرار حتى تختفي عند الطباعة
            body.innerHTML += `<tr><td>${item.name}</td><td>${item.price}</td>
                <td>
                    <span class="no-print">
                        <button class="qty-btn" onclick="decreaseItem(${i})">-</button>
                    </span> 
                    ${item.qty} 
                    <span class="no-print">
                        <button class="qty-btn" onclick="addItem('${item.name}', ${item.price})">+</button>
                    </span>
                </td>
                <td>${sum}</td>
                <td class="no-print"><button onclick="delItem(${i})" style="background:red">X</button></td></tr>`;
        });
        document.getElementById('grandTotal').innerText = total;
    }

    function delItem(i) {
        let inv = JSON.parse(localStorage.getItem('inv') || '[]');
        inv.splice(i, 1);
        localStorage.setItem('inv', JSON.stringify(inv));
        renderInvoice();
    }

    function printInvoice() {
        const now = new Date();
        document.getElementById('printTime').innerText = "التاريخ: " + now.toLocaleDateString() + " | الوقت: " + now.toLocaleTimeString();
        window.print();
    }
</script>
</body>
</html>
